name: Huawei Cloud Golden Image Pipeline

on:
  workflow_dispatch:
    inputs:
      os_choice:
        description: 'Target Operating System'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - Rocky 9
          - Ubuntu 24.04
      scan_only:
        description: 'Skip Packer Build (Run Compliance Scan Only)'
        required: true
        default: false
        type: boolean
      hw_region:
        description: 'Huawei Cloud Region (Leave blank to use default, my-kualalumpur-1)'
        required: false
        type: string
      rocky_image_name_override:
        description: 'Custom Rocky Image Name Override (Optional)'
        required: false
        type: string
      ubuntu_image_name_override:
        description: 'Custom Ubuntu Image Name Override (Optional)'
        required: false
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  # ============================================================
  # STAGE 1: PREPARE (Calculate SemVer & Build Matrix)
  # ============================================================
  prepare:
    name: Prepare Pipeline & SemVer
    runs-on: ubuntu-latest
    outputs:
      new_version:   ${{ steps.version.outputs.clean_version || '1.0.0' }}
      matrix_config: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Calculate Next SemVer
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: hw-v
          dry_run: true
          default_bump: patch

      - name: Normalize Version String
        id: version
        run: |
          RAW="${{ steps.semver.outputs.new_version }}"
          CLEAN="${RAW#v}"
          CLEAN="${CLEAN%%-*}"
          echo "clean_version=$CLEAN" >> $GITHUB_OUTPUT

      - name: Set Dynamic Matrix
        id: set-matrix
        run: |
          CHOICE="${{ inputs.os_choice }}"
          if [[ -z "$CHOICE" || "$CHOICE" == "all" ]]; then
            echo 'matrix=[{"os":"Huawei Rocky 9","runner":"self-hosted"},{"os":"Huawei Ubuntu 24.04","runner":"self-hosted"}]' >> $GITHUB_OUTPUT
          elif [[ "$CHOICE" == "Rocky 9" ]]; then
            echo 'matrix=[{"os":"Huawei Rocky 9","runner":"self-hosted"}]' >> $GITHUB_OUTPUT
          elif [[ "$CHOICE" == "Ubuntu 24.04" ]]; then
            echo 'matrix=[{"os":"Huawei Ubuntu 24.04","runner":"self-hosted"}]' >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # STAGE 2: BUILD & SCAN (Parallel Matrix)
  # ============================================================
  matrix-factory:
    name: Build & Scan (${{ matrix.os_config.os }})
    needs: prepare
    runs-on: ${{ matrix.os_config.runner }}
    strategy:
      fail-fast: false
      matrix:
        os_config: ${{ fromJson(needs.prepare.outputs.matrix_config) }}

    env:
      # ── Huawei Cloud SDK variables (Required for pre-flight auth) ───────
      HW_ACCESS_KEY:                ${{ secrets.HW_ACCESS_KEY }}
      HW_SECRET_KEY:                ${{ secrets.HW_SECRET_KEY }}
      HW_PROJECT_ID:                ${{ secrets.HW_PROJECT_ID }}
      HW_LOCATION:                  ${{ inputs.hw_region || vars.HW_LOCATION }}

      # ── Huawei Cloud Packer variables (Required for .pkr.hcl) ───────────
      PKR_VAR_hw_access_key:        ${{ secrets.HW_ACCESS_KEY }}
      PKR_VAR_hw_secret_key:        ${{ secrets.HW_SECRET_KEY }}
      PKR_VAR_hw_project_id:        ${{ secrets.HW_PROJECT_ID }}
      PKR_VAR_hw_region:            ${{ inputs.hw_region || vars.HW_LOCATION }}
      PKR_VAR_hw_vpc_id:            ${{ secrets.HW_VPC_ID }}
      PKR_VAR_hw_subnet_id:         ${{ secrets.HW_SUBNET_ID }}
      PKR_VAR_hw_security_group_id: ${{ secrets.HW_SECURITY_GROUP_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Resolve VM Slug
        run: |
          case "${{ matrix.os_config.os }}" in
            "Huawei Rocky 9")       echo "VM_SLUG=hw-rocky"  >> $GITHUB_ENV ;;
            "Huawei Ubuntu 24.04")  echo "VM_SLUG=hw-ubuntu" >> $GITHUB_ENV ;;
            *)
              echo "ERROR: Unrecognised OS '${{ matrix.os_config.os }}'"
              exit 1
              ;;
          esac

      # ──────────────────────────────────────────────────────────────────────
      # PACKER BUILD PHASE
      # ──────────────────────────────────────────────────────────────────────

      - name: Setup HashiCorp Packer
        if: ${{ inputs.scan_only != true }}
        uses: hashicorp/setup-packer@v3.2.0
        with:
          version: 'latest'

      - name: Install Ansible Galaxy roles
        if: ${{ inputs.scan_only != true }}
        working-directory: ./ansible
        run: |
          if [ -d "roles/ubuntu24-cis" ]; then
            echo "Ansible roles already exist. Skipping download."
          else
            echo "Roles missing. Installing from requirements.yml..."
            ansible-galaxy install -r requirements.yml --roles-path roles/
          fi

      - name: Packer Init
        if: ${{ inputs.scan_only != true }}
        env:
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: packer init .
        working-directory: >-
          ${{ matrix.os_config.os == 'Huawei Rocky 9'
           && './packer-huawei-rocky'
           ||   './packer-huawei-ubuntu' }}

      - name: Configure Huawei Cloud CLI
        run: |
          echo "y" | cae configure set \
            --cli-access-key="${{ secrets.HW_ACCESS_KEY }}" \
            --cli-secret-key="${{ secrets.HW_SECRET_KEY }}" \
            --cli-project-id="${{ secrets.HW_PROJECT_ID }}" \
            --cli-region="${{ env.HW_LOCATION }}" \
            --cli-skip-secure-verify=true

      - name: Prepare user_data with PermitRootLogin fix
        if: ${{ inputs.scan_only != true }}
        run: |
          printf '#!/bin/bash\nsed -i "s/^#\\?PermitRootLogin.*/PermitRootLogin yes/" /etc/ssh/sshd_config\nsystemctl restart sshd\n' > /tmp/hw_userdata.sh
          chmod +x /tmp/hw_userdata.sh
          echo "Verifying user_data contents:"
          cat /tmp/hw_userdata.sh
          echo "USERDATA_FILE=/tmp/hw_userdata.sh" >> $GITHUB_ENV

      - name: Build Golden Image
        if: ${{ inputs.scan_only != true }}
        env:
          PACKER_LOG: "1"
        run: |
          packer build \
            -force \
            -var "image_version=${{ needs.prepare.outputs.new_version }}" \
            -var "user_data_file=/tmp/hw_userdata.sh" \
            .
        working-directory: >-
          ${{ matrix.os_config.os == 'Huawei Rocky 9'
           && './packer-huawei-rocky'
           ||   './packer-huawei-ubuntu' }}

      # ──────────────────────────────────────────────────────────────────────
      # DEPLOY EPHEMERAL VM FOR SCANNING
      # ──────────────────────────────────────────────────────────────────────

      - name: Generate Ephemeral SSH Key
        run: ssh-keygen -t ed25519 -f ~/.ssh/scanner_key -N ""

      - name: Resolve Target Image Name
        id: image
        run: |
          case "${{ matrix.os_config.os }}" in
            # ── prefix matches the actual IMS naming convention ──
            "Huawei Rocky 9")       echo "name=${{ inputs.rocky_image_name_override  || format('rocky9-cis-v{0}', needs.prepare.outputs.new_version) }}" >> $GITHUB_OUTPUT ;;
            "Huawei Ubuntu 24.04")  echo "name=${{ inputs.ubuntu_image_name_override || format('ubuntu24.04-cis-v{0}', needs.prepare.outputs.new_version) }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Prepare user_data for Pipeline Scanner
        run: |
          echo "--- Generating Cloud-Init for Ephemeral Scanner ---"
          SCANNER_PUB_KEY=$(cat ~/.ssh/scanner_key.pub)
          printf "#!/bin/bash\nmkdir -p /home/sysadmin/.ssh\necho '$SCANNER_PUB_KEY' >> /home/sysadmin/.ssh/authorized_keys\nchown -R sysadmin:sysadmin /home/sysadmin/.ssh\nchmod 700 /home/sysadmin/.ssh\nchmod 600 /home/sysadmin/.ssh/authorized_keys\n" > /tmp/hw_scan_userdata.sh
          cat /tmp/hw_scan_userdata.sh

      - name: Deploy Ephemeral VM
        run: |
          IMAGE_NAME="${{ steps.image.outputs.name }}"
          echo "Resolving IMS image ID for: $IMAGE_NAME"

          cae IMS ListImages \
            --cli-region="${{ env.HW_LOCATION }}" \
            > /tmp/ims_list_output.json 2>&1 || true

          HW_IMAGE_ID=$(jq -r --arg name "$IMAGE_NAME" \
            '.images[] | select(.name == $name) | .id // empty' \
            /tmp/ims_list_output.json | head -1)

          if [[ -z "$HW_IMAGE_ID" ]]; then
            echo "ERROR: No image found with name '$IMAGE_NAME'"
            exit 1
          fi

          echo "HW_IMAGE_ID=$HW_IMAGE_ID" >> $GITHUB_ENV
          EPHEMERAL_NAME="scan-ephemeral-${{ env.VM_SLUG }}"

          # Prepare and encode User Data (Base64 is required by the API)
          ENCODED_USER_DATA=$(base64 -w 0 /tmp/hw_scan_userdata.sh)

          # Execute CreateServers
          cae ECS CreateServers \
            --cli-region="${{ env.HW_LOCATION }}" \
            --server.name="$EPHEMERAL_NAME" \
            --server.flavorRef="c6.large.2" \
            --server.imageRef="$HW_IMAGE_ID" \
            --server.vpcid="${{ secrets.HW_VPC_ID }}" \
            --server.nics.1.subnet_id="${{ secrets.HW_SUBNET_ID }}" \
            --server.security_groups.1.id="${{ secrets.HW_SECURITY_GROUP_ID }}" \
            --server.root_volume.volumetype="SAS" \
            --server.root_volume.size=40 \
            --server.publicip.eip.iptype="5_bgp" \
            --server.publicip.eip.bandwidth.size=5 \
            --server.publicip.eip.bandwidth.sharetype="PER" \
            --server.publicip.eip.bandwidth.chargemode="traffic" \
            --server.publicip.delete_on_termination="true" \
            --server.user_data="$ENCODED_USER_DATA" \
            > create_server_output.json

          # Check for success and extract Job ID
          if ! jq -e '.job_id' create_server_output.json > /dev/null 2>&1; then
            echo "ERROR: CreateServers failed or returned invalid response."
            cat create_server_output.json
            exit 1
          fi

          HW_JOB_ID=$(jq -r '.job_id' create_server_output.json)
          echo "Job submitted: $HW_JOB_ID. Waiting for completion..."

          # Polling logic
          for i in {1..30}; do
            JOB_OUTPUT=$(cae ECS GetJob --cli-region="${{ env.HW_LOCATION }}" --jobid="$HW_JOB_ID")
            STATUS=$(echo "$JOB_OUTPUT" | jq -r '.status')
            echo "Job status: $STATUS (attempt $i/30)"
            
            if [[ "$STATUS" == "SUCCESS" ]]; then break; fi
            if [[ "$STATUS" == "FAIL" ]]; then
              echo "ERROR: ECS Creation job failed."
              exit 1
            fi
            sleep 10
          done

          HW_SERVER_ID=$(cae ECS ListServers \
            --cli-region="${{ env.HW_LOCATION }}" \
            | jq -r --arg name "$EPHEMERAL_NAME" \
            '.servers[] | select(.name == $name) | .id // empty' | head -1)

          VM_IP=$(cae ECS ListServers \
            --cli-region="${{ env.HW_LOCATION }}" \
            | jq -r --arg id "$HW_SERVER_ID" \
            '.servers[] | select(.id == $id) | .addresses | to_entries[0].value[0].addr // empty' | head -1)

          echo "VM_IP=$VM_IP" >> $GITHUB_ENV
          echo "HW_SERVER_ID=$HW_SERVER_ID" >> $GITHUB_ENV
          echo "EPHEMERAL_NAME=$EPHEMERAL_NAME" >> $GITHUB_ENV

      # ──────────────────────────────────────────────────────────────────────
      # WAIT FOR SSH
      # ──────────────────────────────────────────────────────────────────────

      - name: Wait for SSH Connection
        run: |
          for i in {1..20}; do
            if ssh -o StrictHostKeyChecking=no \
                  -o ConnectTimeout=5 \
                  -i ~/.ssh/scanner_key \
                  sysadmin@"$VM_IP" exit 0 2>/dev/null; then
              echo "SSH is up after attempt $i."
              break
            fi
            echo "Attempt $i/20 — SSH not ready, retrying in 10s..."
            sleep 10
            if [ "$i" -eq 20 ]; then
              echo "ERROR: SSH never became available after 200s."
              exit 1
            fi
          done

      # ──────────────────────────────────────────────────────────────────────
      # SCAN PHASE
      # ──────────────────────────────────────────────────────────────────────

      - name: Run Huawei Rocky OpenSCAP & Download Report
        if: ${{ matrix.os_config.os == 'Huawei Rocky 9' }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
              sysadmin@${{ env.VM_IP }} << 'EOF'
            sudo dnf install -y openscap-scanner scap-security-guide
            sudo oscap xccdf eval \
              --profile xccdf_org.ssgproject.content_profile_cis_server_l1 \
              --report /tmp/hw-rocky-cis-report.html \
              /usr/share/xml/scap/ssg/content/ssg-rl9-ds.xml || true
            sudo cp /tmp/hw-rocky-cis-report.html /home/sysadmin/
            sudo chown sysadmin:sysadmin /home/sysadmin/hw-rocky-cis-report.html
          EOF
          scp -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
            sysadmin@${{ env.VM_IP }}:/home/sysadmin/hw-rocky-cis-report.html \
            ./hw-rocky-cis-report.html

      - name: Run Huawei Ubuntu 24.04 OpenSCAP & Download Report
        if: ${{ matrix.os_config.os == 'Huawei Ubuntu 24.04' }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
              sysadmin@${{ env.VM_IP }} << 'EOF'
            sudo apt-get update -qq
            sudo apt-get install -y libopenscap8 unzip wget
            wget -q https://github.com/ComplianceAsCode/content/releases/download/v0.1.75/scap-security-guide-0.1.75.zip
            unzip -q scap-security-guide-0.1.75.zip
            sudo oscap xccdf eval \
              --profile xccdf_org.ssgproject.content_profile_cis_level1_server \
              --report /tmp/hw-ubuntu-2404-cis-report.html \
              scap-security-guide-0.1.75/ssg-ubuntu2404-ds.xml || true
            sudo cp /tmp/hw-ubuntu-2404-cis-report.html /home/sysadmin/
            sudo chown sysadmin:sysadmin /home/sysadmin/hw-ubuntu-2404-cis-report.html
          EOF
          scp -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
            sysadmin@${{ env.VM_IP }}:/home/sysadmin/hw-ubuntu-2404-cis-report.html \
            ./hw-ubuntu-2404-cis-report.html

      # ──────────────────────────────────────────────────────────────────────
      # TEARDOWN
      # ──────────────────────────────────────────────────────────────────────

      - name: Prune Empty Reports (Failsafe)
        if: always()
        run: |
          echo "Removing any 0-byte reports to prevent GitHub Release API errors..."
          find . -maxdepth 1 -name "*-cis-report.*" -type f -size 0 -print -delete

      - name: Destroy Ephemeral VM (Huawei)
        if: always() && env.HW_SERVER_ID != ''
        run: |
          cae ECS DeleteServers \
            --cli-region="${{ env.HW_LOCATION }}" \
            --servers.0.id="$HW_SERVER_ID" \
            --delete_volume=true || true

          cae ECS NovaDeleteKeypair \
            --cli-region="${{ env.HW_LOCATION }}" \
            --keypair_name="scanner-key-${{ github.run_number }}" || true

      - name: Upload Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.VM_SLUG }}-report
          path: ./*-cis-report.*

      # ──────────────────────────────────────────────────────────────────────
      # RUNNER CLEANUP
      # ──────────────────────────────────────────────────────────────────────

      - name: Clean up Self-Hosted Runner State
        if: always()
        run: |
          echo "Cleaning up temporary files to prevent state contamination..."
          rm -f ~/.ssh/scanner_key ~/.ssh/scanner_key.pub
          rm -f ./*-cis-report.*
          rm -f ./crash.log
          echo "Runner cleanup complete."

  # ============================================================
  # STAGE 3: PUBLISH (Tag & Release)
  # ============================================================
  release:
    name: Publish Huawei DevSecOps Release
    needs: [prepare, matrix-factory]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && !failure() }}
    steps:
      - name: Download All Reports
        uses: actions/download-artifact@v4
        with:
          path: ./reports
          merge-multiple: true

      - name: Push Official Git Tag
        if: ${{ inputs.scan_only != true }}
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: hw-v
          custom_tag: ${{ needs.prepare.outputs.new_version }}

      - name: Publish Golden Image Release
        if: ${{ inputs.scan_only != true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: hw-v${{ needs.prepare.outputs.new_version }}
          name: "Huawei Golden Image Release v${{ needs.prepare.outputs.new_version }}"
          body: |
            ## Huawei Cloud Golden Image Factory — v${{ needs.prepare.outputs.new_version }}

            Automated CIS Level 1 Compliance Reports for all built Huawei Cloud images.

            | Image | Benchmark | Profile |
            |-------|-----------|---------|
            | Huawei Rocky Linux 9 | CIS AlmaLinux/Rocky Linux 9 | Level 1 Server |
            | Huawei Ubuntu 24.04 | CIS Ubuntu Linux 24.04 LTS | Level 1 Server |

            **IMS image version:** `${{ needs.prepare.outputs.new_version }}`
            **Region:** `${{ inputs.hw_region || vars.HW_LOCATION }}`
          fail_on_unmatched_files: false
          files: ./reports/*-cis-report.*

      - name: Publish Ad-Hoc Scan Report
        if: ${{ inputs.scan_only == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: hw-scan-report-${{ github.run_number }}
          name: "Huawei Ad-Hoc Compliance Scan #${{ github.run_number }}"
          body: |
            Manual CIS Level 1 compliance evaluation against existing Huawei IMS images.
            *(No new image versions were built during this run.)*
          fail_on_unmatched_files: false
          files: |
            ./reports/*-cis-report.html
            ./reports/*-cis-report.json
